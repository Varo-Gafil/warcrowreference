<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warcrow Companion | Skirmish Reference</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --warcrow-gold: #c5a059;
            --warcrow-dark: #0a0c10;
            --warcrow-card: #161a21;
            --warcrow-border: #2d343f;
            --warcrow-red: #8b1e1e;
            --warcrow-purple: #4a1d6e;
            --header-height: 80px; 
        }

        body {
            background-color: var(--warcrow-dark);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: var(--header-height);
        }

        .heading-font { font-family: 'Cinzel', serif; }
        .gold-text { color: var(--warcrow-gold); }
        
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            z-index: 50;
            background-color: #0a0c10;
            border-bottom: 1px solid #2d343f;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* Side Navigation Menu */
        #sideNav {
            position: fixed;
            top: 0;
            right: -100%;
            width: 300px;
            height: 100vh;
            background: #0d1016;
            z-index: 100;
            transition: right 0.3s ease-in-out;
            border-left: 1px solid var(--warcrow-border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        #sideNav.open {
            right: 0;
        }

        .nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .nav-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .side-nav-link {
            padding: 1.25rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .side-nav-link:hover {
            background: rgba(197, 160, 89, 0.05);
            color: var(--warcrow-gold);
        }

        .side-nav-link.active {
            color: var(--warcrow-gold);
            border-left: 4px solid var(--warcrow-gold);
            background: rgba(197, 160, 89, 0.08);
        }

        /* Hamburger Animation */
        .menu-btn {
            position: relative;
            width: 30px;
            height: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-btn span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: var(--warcrow-gold);
            transition: all 0.3s ease;
        }

        .action-card {
            background-color: var(--warcrow-card);
            border: 1px solid var(--warcrow-border);
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .action-card:hover { border-color: var(--warcrow-gold); }

        details summary {
            list-style: none;
            cursor: pointer;
            outline: none;
        }

        details summary::-webkit-details-marker { display: none; }

        details[open] summary {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 1rem;
        }

        .category-header {
            border-left: 3px solid var(--warcrow-gold);
            padding-left: 12px;
            margin: 2rem 0 1rem 0;
        }

        .step-list {
            list-style: none;
            padding-left: 0;
        }

        .step-item {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #a0aec0;
        }

        .step-item::before {
            content: "•";
            position: absolute;
            left: 0;
            top: 0;
            color: var(--warcrow-gold);
            font-weight: bold;
            font-size: 0.75rem;
        }

        .scenario-radio {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--warcrow-border);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            background: transparent;
        }
        .scenario-radio:checked {
            border-color: var(--warcrow-gold);
        }
        .scenario-radio:checked::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--warcrow-gold);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .selected-row {
            background: rgba(197, 160, 89, 0.05);
        }

        .chevron { transition: transform 0.2s ease; }
        details[open] .chevron { transform: rotate(180deg); }

        .fade-in { animation: fadeIn 0.3s ease-in forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-gold {
            background: var(--warcrow-gold);
            color: var(--warcrow-dark);
            font-family: 'Cinzel', serif;
            font-weight: bold;
            letter-spacing: 0.1em;
            padding: 0.75rem 2rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .btn-gold:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(197, 160, 89, 0.3);
        }

        .btn-outline {
            background: transparent;
            color: var(--warcrow-gold);
            border: 1px solid var(--warcrow-gold);
            font-family: 'Cinzel', serif;
            font-weight: bold;
            letter-spacing: 0.1em;
            padding: 0.75rem 2rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .btn-outline:hover {
            background: rgba(197, 160, 89, 0.1);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            letter-spacing: 0.1em;
            padding: 0.75rem 2rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.2);
        }

        .counter-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--warcrow-border);
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .counter-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--warcrow-gold);
        }

        footer {
            margin-top: auto;
            border-top: 1px solid var(--warcrow-border);
            background: #0d1016;
        }

        .map-image {
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--warcrow-border);
            border-radius: 8px;
            margin-top: 1rem;
        }

        /* Terrain Table Styling */
        .terrain-table th {
            border-bottom: 2px solid var(--warcrow-gold);
            color: var(--warcrow-gold);
            font-family: 'Cinzel', serif;
            padding: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .terrain-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--warcrow-border);
            color: #cbd5e1;
        }
        .terrain-table tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

        const data = {

                { name: "Fence/Barricade", keywords: "Cover(<img src='BKDice.png' style= 'width:20px; display:inline; vertical-align:middle;'/>)", size: "Base between 4 and 13 strides long and no more than 1 stride wide." },

                { name: "Building", keywords: "Block LoS, Cover(<img src='BLDice.png' style= 'width:20px; display:inline; vertical-align:middle;'/>), Impassible", size: "Base with a surface equivalent to a square measuring between 7 and 10 strides a side." },
                { name: "Light Forest", keywords: "Block LoS, Cover(<img src='BKDice.png' style= 'width:20px; display:inline; vertical-align:middle;'/>)", size: "Base with a surface equivalent to a square measuring between 7 and 10 strides a side." },
                { name: "Dense Forest", keywords: "Rugged(Cavalry,Golem), Cover(<img src='BKDice.png' style= 'width:20px; display:inline; vertical-align:middle;'/>)", size: "Base with a surface equivalent to a square measuring between 7 and 10 strides a side." },

                            image: "InfluenceZones.png"
                        },
                        { 
                            id: "s3",

                            endGame: "The game ends at the end of round 3.",

                            prep:["The company that wins the initiative receives event tokens 1 and 3, the rival company receives event tokens 2 and 4.","Each company places one of their event tokens on the “1” position of the turn counter (glory meter).","After deploying all units in the game preparation phase (including Scouts), each company, in deployment order,chooses one of their deployed units to carry the banner, placing an event token on their profile card.","Characters carrying the banner cannot join a unit","A unit carrying the banner cannot have a joined Character."],
                            ruleslabel: "Banner",

                            </summary>
                            <div class="px-5 pb-5">
                                <p class="text-sm text-slate-400 mb-4">${item.desc}</p>
                                ${item.steps ? `<ul class="step-list">${item.steps.map(s => `<li class="step-item">${s}</li>`).join('')}</ul>` : ''}
                            </div>
                        </details>
                    `;
                    grid.appendChild(card);
                });
                section.appendChild(grid);
                wrapper.appendChild(section);
            });
        }

        function render() {
            const query = searchInput.value.trim().toLowerCase();
            if (currentView === 'home') renderHome();
            else if (currentView === 'scoreboard') renderScoreboard();
            else if (currentView === 'terrain') renderTerrain();
            else renderList(currentView, query);
        }

        searchInput.addEventListener('input', () => {
            if (currentView === 'home' && searchInput.value.length > 0) setView('actions');
            else render();
        });

        // Initialize
        render();
    </script>
</body>
</html>
