<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warcrow Reference | Quick Reference and Adventure Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --warcrow-gold: #c5a059;
            --warcrow-dark: #0a0c10;
            --warcrow-card: #161a21;
            --warcrow-border: #2d343f;
            --warcrow-red: #8b1e1e;
            --warcrow-purple: #4a1d6e;
            --header-height: 80px; 
        }

        body {
            background-color: var(--warcrow-dark);
            background-image: url(background.png);
            background-repeat: no-repeat;
            background-size: cover;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: var(--header-height);
        }

        .heading-font { font-family: 'Cinzel', serif; }
        .gold-text { color: var(--warcrow-gold); }
        
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            z-index: 50;
            background-color: #0a0c10;
            border-bottom: 1px solid #2d343f;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* Side Navigation Menu */
        #sideNav {
            position: fixed;
            top: 0;
            right: -100%;
            width: 300px;
            height: 100vh;
            background: #0d1016;
            z-index: 100;
            transition: right 0.3s ease-in-out;
            border-left: 1px solid var(--warcrow-border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        #sideNav.open {
            right: 0;
        }

        .nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .nav-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .side-nav-link {
            padding: 1.25rem 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.85rem;
            font-weight: 600;
            color: #94a3b8;
        }

        .side-nav-link:hover {
            background: rgba(197, 160, 89, 0.05);
            color: var(--warcrow-gold);
        }

        .side-nav-link.active {
            color: var(--warcrow-gold);
            border-left: 4px solid var(--warcrow-gold);
            background: rgba(197, 160, 89, 0.08);
        }

        /* Hamburger Animation */
        .menu-btn {
            position: relative;
            width: 30px;
            height: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-btn span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: var(--warcrow-gold);
            transition: all 0.3s ease;
        }

        .action-card {
            background-color: var(--warcrow-card);
            border: 1px solid var(--warcrow-border);
            transition: all 0.2s ease;
            overflow: hidden;
        }

        .action-card:hover { border-color: var(--warcrow-gold); }

        details summary {
            list-style: none;
            cursor: pointer;
            outline: none;
        }

        details summary::-webkit-details-marker { display: none; }

        details[open] summary {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 1rem;
        }

        .category-header {
            border-left: 3px solid var(--warcrow-gold);
            padding-left: 12px;
            margin: 2rem 0 1rem 0;
        }

        .step-list {
            list-style: none;
            padding-left: 0;
        }

        .step-item {
            position: relative;
            padding-left: 1.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #a0aec0;
        }

        .step-item::before {
            content: "•";
            position: absolute;
            left: 0;
            top: 0;
            color: var(--warcrow-gold);
            font-weight: bold;
            font-size: 0.75rem;
        }

        .scenario-radio {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--warcrow-border);
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            background: transparent;
        }
        .scenario-radio:checked {
            border-color: var(--warcrow-gold);
        }
        .scenario-radio:checked::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--warcrow-gold);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .selected-row {
            background: rgba(197, 160, 89, 0.05);
        }

        .chevron { transition: transform 0.2s ease; }
        details[open] .chevron { transform: rotate(180deg); }

        .fade-in { animation: fadeIn 0.3s ease-in forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-gold {
            background: var(--warcrow-gold);
            color: var(--warcrow-dark);
            font-family: 'Cinzel', serif;
            font-weight: bold;
            letter-spacing: 0.1em;
            padding: 0.75rem 2rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .btn-gold:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(197, 160, 89, 0.3);
        }

        .btn-outline {
            background: transparent;
            color: var(--warcrow-gold);
            border: 1px solid var(--warcrow-gold);
            font-family: 'Cinzel', serif;
            font-weight: bold;
            letter-spacing: 0.1em;
            padding: 0.75rem 2rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .btn-outline:hover {
            background: rgba(197, 160, 89, 0.1);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: transparent;
            color: #ef4444;
            border: 1px solid #ef4444;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            letter-spacing: 0.1em;
            padding: 0.75rem 2rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.2);
        }

        .counter-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--warcrow-border);
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .counter-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--warcrow-gold);
        }

        footer {
            margin-top: auto;
            border-top: 1px solid var(--warcrow-border);
            background: #0d1016;
        }

        .map-image {
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--warcrow-border);
            border-radius: 8px;
            margin-top: 1rem;
        }

        /* Terrain Table Styling */
        .terrain-table th {
            border-bottom: 2px solid var(--warcrow-gold);
            color: var(--warcrow-gold);
            font-family: 'Cinzel', serif;
            padding: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .terrain-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--warcrow-border);
            color: #cbd5e1;
        }
        .terrain-table tr:hover {
            background: rgba(255,255,255,0.03);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Modal / Information Panel Style */
        .info-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 2rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .info-modal.active {
            opacity: 1;
            pointer-events: auto;
        }
        .info-panel {
            background: var(--warcrow-card);
            border: 1px solid var(--warcrow-gold);
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Overlay -->
    <div id="navOverlay" class="nav-overlay" onclick="toggleNav()"></div>

        <!-- Info Modal -->
    <div id="infoModal" class="info-modal" onclick="closeInfoModal()">

                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

    <!-- Side Navigation -->

            </button>

    <!-- Search added to Side Nav -->
        <div class="px-6 py-4 border-b border-white/5">

                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-3 w-3 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>

            <button onclick="toggleNav()" class="flex items-center gap-3 group">

    <script>
        // GLOBAL APP STATE (Persistent throughout navigation)
        let selectedScenario = null;
        let selectedFeat = null;
        let currentView = 'home';
        
        let scoreState = {
            p1: { military: 0, arcane: 0 },
            p2: { military: 0, arcane: 0 }
        };

        const data = {
            terrain: [
                { name: "Fence/Barricade", keywords: "Cover(<img src='BKDice.png' style= 'width:20px; display:inline; vertical-align:middle;'/>)", size: "Base between 4 and 13 strides long and no more than 1 stride wide." },
                { name: "Wall", keywords: "Cover (<img src='BLDice.png' style= 'width:20px; display:inline; vertical-align:middle;'/>)", size: "Base between 4 and 13 strides long and no more than 1 stride wide." },
                { name: "Small Structure", keywords: "Block LoS, Cover(<img src='BKDice.png' style= 'width:20px; display:inline; vertical-align:middle;'/>), Impassible", size: "Base with a surface equivalent to a square measuring between 4 and 7 strides a side." },
                { name: "Building", keywords: "Block LoS, Cover(<img src='BLDice.png' style= 'width:20px; display:inline; vertical-align:middle;'/>), Impassible", size: "Base with a surface equivalent to a square measuring between 7 and 10 strides a side." },
                { name: "Light Forest", keywords: "Block LoS, Cover(<img src='BKDice.png' style= 'width:20px; display:inline; vertical-align:middle;'/>)", size: "Base with a surface equivalent to a square measuring between 7 and 10 strides a side." },
                { name: "Dense Forest", keywords: "Rugged(Cavalry,Golem), Cover(<img src='BKDice.png' style= 'width:20px; display:inline; vertical-align:middle;'/>)", size: "Base with a surface equivalent to a square measuring between 7 and 10 strides a side." },
                { name: "River", keywords: "Rugged", size: "Base between 4 and 13 strides long and no more than 7 strides wide." },
                { name: "Lake", keywords: "Impassable", size: "Base with a surface equivalent to a square measuring between 7 and 10 strides a side." },
                { name: "Ruins", keywords: "Rugged, Cover(<img src='BKDice.png' style= 'width:20px; display:inline; vertical-align:middle;'/>) ", size: "Base with a surface equivalent to a square measuring between 7 and 10 strides a side." },
                { name: "Rugged Terrain", keywords: "Rugged", size: "Base with a surface equivalent to a square measuring between 7 and 10 strides a side." },
            ],
            scenario: [
                {
                    category: "Scenarios",
                    items: [
                        { 
                            id: "s1", 
                            name: "Take Position", 
                            desc: "", 
                            required: ["2 red objective markers.", "2 Blue objective markers."],
                            rounds: ["Each round has a duration of 5 turns."],
                            scoring: ["1 MP for each objective of their rival’s color they control.", "1 MP if no objective of their color is controlled by their rival."],
                            endGame: "The game ends at the end of round 3.",
                            AdditionalRules:[],
                            image: "TakePositions.png"
                        },
                        { 
                            id: "s2",

                            desc: "",

                            rounds: ["Each round has a duration of 5 turns."],
                            scoring: ["1 MP if they control more objectives than their rival", "1 MP if they control at least one objective of their rivel's color.","1 MP if they control a least 2 objectives"],
                            endGame: "The game ends at the end of round 3.",
                            AdditionalRules:["Strategic Domain: All units that are not demoralized have their conquest calue increased by 1", " Influence Zones:Units may contest control of objectives at 7 strides instead of 3"],
                            image: "InfluenceZones.png"
                        },
                        { 
                            id: "s3",

                            rounds: ["Each round has a duration of 5 turns."],
                            scoring: ["2 MP if they control more brown objectives than their rival", "1 MP if they control the same amount of brown objectives as their rival","1 MP if they control the central objective"],
                            endGame: "The game ends at the end of round 3.",
                            AdditionalRules:["Brown objective markers start the game controlled by the company that has their deployment zone adjacent to them."],
                            image: "Expanse.png"
                        },
                        {

                            endGame: "The game ends at the end of round 3.",
                             AdditionalRules:["Objective markers are used to represent loot.","At the end of its activation, a unit adjacent to an objective marker may suffer 1 stress to pick it up (placing it on their profile card).","Units may move through an objective marker but cannot end their movement on one.","Units cannot pick up objective markers of their rival’s color.","Units cannot carry more than 1 objective marker at the same time.","When a unit carrying loot is about to be removed from the battlefield, the company controlling it places the loot adjacent to their leader before removing it from the battlefield. If the unit has been destroyed and had an Officer Character joined, it may instead give the loot to the Character.","When a unit carrying loot becomes demoralized, place the objective marker adjacent to their leader before fleeing.","If a Character leaves a unit carrying loot, it can choose to take the loot or leave it in the unit."],
                            image: "Loot.png"
                        },
                        {

                            name: "Consolidated Progress",

                            AdditionalRules:["All units that are not demoralized have their value increased by 1","Conquest value modifiers(from skills and effects are not increased)","The battlefield (not including deployment zones) is divided into four quadrants, which can be controlled as if they were objectives although no objective markers are used.","Units can contest control of a quadrant if their leader is within the quadrant (a leader whose base is in contact with more than one quadrant is not within any quadrant, so their unit cannot control or contest any quadrant).","Although no objective markers are used, a conquest marker is placed in each quadrant to indicate which company controls it."],

                            prep:["The company that wins the initiative receives event tokens 1 and 3, the rival company receives event tokens 2 and 4.","Each company places one of their event tokens on the “1” position of the turn counter (track meter).","After deploying all units in the game preparation phase (including Scouts), each company, in deployment order, places their remaining event token on any point of the battlefield farther than 10 strides away from their deployment zone (vestige)."],

                            actions:["The contract cannot be the commander","If the contract is removed from the battlefield by any effect it will be considered eliminated (for scoring purposes).","If the unit with the contract has a joined Character, the contract will be considered eliminated once the unit is destroyed, even if the Character survives.","A company that couldn’t choose its contract (because there were no deployed enemy units) will do so at the end of the round. A demoralized unit cannot be chosen as a contract. If a company still can’t choose its contract at the end of a round, it will do so at the end of the next one."],
                            scoring: ["2 AP if they eliminated the rival's commander","1 AP if their commander hasn't been eliminated","1 AP if they eliminated their contract"],
                           
                        },
                        { 
                            id: "f3",

                            preplabel:"Fog",
                            prep:["After deploying all units in the preparation phase (including Scouts), each company, in deployment order, must place a fog marker further than 20 strides from their deployment zone.","These fog markers apply the fog rules (terrain element) and are Immovable.","Character units and units with a joined Character that finish their activation adjacent to one of the event fog markers may begin sealing the rift."],
                            ruleslabel: "Sealing the Rift",
                            rules: ["The unit performs a WP test, using the Character’s WP.The company places an event token on the turn counter, 6 positions ahead of the current turn, and then moves it back 1 position for each 1 <img src='Success.png' style= 'width:20px; display:inline; vertical-align:middle;'/> they got in the test.","Spellcaster Characters add <img src='ODice.png' style= 'width:20px; display:inline; vertical-align:middle;'/> to their roll."],
                            actionlabel:"Remove the event token if:",
                            actions:["The unit is no longer adjacent to the fog marker.","The unit activates.","The Character is taken out of combat.","The Character leaves the unit.","A unit cannot begin sealing a rift that is already being sealed by another unit.","When the event token is activated, the company sealing the rift obtains the fog marker (and removes it from the battlefield)."],

                        },

                            scoring: ["1 AP if their rival lost its banner at any point","1 AP if they didn't lose their own banner","1 AP if their glory meter is on the same position as their rivals","2 AP if their glory meter is higher on the turn counter than their rivals"],

                            ruleslabel: "Resources",
                            rules:["Units further than 12 strides from their deployment zone that are not engaged in combat may suffer 1 stress at the end of their activation to obtain resources.","Obtain Resources:The unit performs a simple roll, the dice of which will depend on the amount of troops in the unit (Support counts when calculating the number of troops for this action). The unit’s company advances their resource meter 1 position for each <img src='Success.png' style= 'width:20px; display:inline; vertical-align:middle;'/> they got. If the resource meter is on position '10', instead of advancing the resource meter, move the rival company’s resource meter back (to a minimum of 1).","A company cannot obtain resources more than once per turn."],

                            scoring: ["1 AP if their resource meter is on position 4 or higher.","1 AP if their resource meter is on position 7 or higher.","1 AP if their resource meter is on position 10.","1 AP if their resource meter is higher on the turn counter than their rival's"],

                        {   
                            name: "Melee Attack", 
                            desc:"1. Attacker performs positioning maneuvers.</br> 2. Select a melee attack from your unit profile.</br> 3. Your opponent makes the defense roll. At this point they must declare whether their unit is stressed <img src='stress.png' style= 'height:20px; display:inline; vertical-align:middle;'/> to add their modifier to the defense roll.</br> 5. Gather your attack dice pool. Declare now if your unit is stressed <img src='stress.png' style= 'height:20px; display:inline; vertical-align:middle;'/> to add the modifier to its attack roll.</br> 6. Resolve a Face to Face roll between your attack roll and your opponent’s defense roll.</br> 7. Your opponent receives as much damage as <img src='Success.png' style= 'height:20px; display:inline; vertical-align:middle;'/> remains on your roll and vice versa, your unit receives as much damage as <img src='Success.png' style= 'height:20px; display:inline; vertical-align:middle;'/> remains on your opponent’s roll. To determine who won the fight, compare the total damage inflicted by each side:",

            magic: [

            ],
            states: [
                { category: "States", 
                items: [
                    { name: "<img src='Demoralized.png' style= 'width:40px; display:inline; vertical-align:middle;'/> Demoralized", desc: "If your unit is demoralized: </br> </br> • It cannot be activated in any way.</br> • It cannot stress itself in any way and cannot reduce its stress.</br> • It cannot control objectives (we consider its conquest value null).</br> • It cannot activate its command abilities.</br> • If it participates in combat, it will always flee after the result. (See “Melee Attack”)." },
                    { name: "<img src='Disarmed.png' style= 'width:40px; display:inline; vertical-align:middle;'/> Disarmed", desc: "Your unit must cancel one die from its attack rolls in which it has obtained at least one <img src='Success.png' style= 'width:20px; display:inline; vertical-align:middle;'/>. In the case of multiple dice, your opponent will choose which one. You must apply this effect after rolling the dice (with all possible repetitions), but just before starting the Switches step.</br> </br> You cannot add modifiers to your attack rolls. </br></br> Remove this state at the end of the resolution of a roll in which you have applied its effects (if you have not been able to cancel any die, the state is considered to remain active)." },
                    { name: "<img src='Frightened.png' style= 'width:40px; display:inline; vertical-align:middle;'/> Frightened", desc: "When making a WP test, your unit must reroll the dice on which it rolls at least one <img src='Success.png' style= 'width:20px; display:inline; vertical-align:middle;'/>.</br></br> Remove this state after making a willpower test." },
                    { name: "<img src='Slowed.png' style= 'width:40px; display:inline; vertical-align:middle;'/> Slowed", desc: "Your unit can only use one of the two MOV values when performing the move and assault actions. Additionally, you must subtract 4 strides from your charge movement (up to a minimum value of 0). For example, if your unit has movement 3-2 (9), it can only move 3 and can only move 5 when it charges.</br></br> Remove this state at the end of the activation in which your unit performs the action move, charge or assault." },
                    { name: "<img src='Vulnerable.png' style= 'width:40px; display:inline; vertical-align:middle;'/> Vulnerable", desc: "Your unit must cancel one die from its defense rolls in which it has rolled at least one <img src='Shield.png' style= 'height:20px; display:inline; vertical-align:middle;'/>. In the case of multiple dice, your opponent will choose which one. You must apply this effect after rolling the dice (with all possible repetitions), but just before starting the Switches step.</br></br> You cannot add modifiers to your defense rolls.</br></br> Remove this state at the end of the resolution of a roll in which you have applied its effects (if you have not been able to cancel any die, the state is considered to remain active)." },

                ] }
            ],
            keywords: [
                { category: "Keywords", 
                items: [
                    { name: "Aim", desc: "Your unit can re-roll its ranged attack rolls. The target unit of your ranged attack cannot benefit from Cover(D)." },
                    { name: "Ambusher", desc: "Ambusher units wait in hiding, ready to move into action once the battle has already started, striking by surprise. If you want, you can keep your Ambusher units secret and not deploy them until after you have started the game.</br</br> You can activate your Ambusher unit during your turn instead of activating another unit, as if your Ambushers were on the battlefield. In this case, do the following:</br></br> 1. Deploy it on the battlefield in one of two places: <i></br<br> At any point in your deployment area. You can deploy it engaged in combat with an enemy unit. It is considered to have charged, but the enemy unit cannot hold and fire.</br></br>Anywhere on the battlefield, except your opponent’s deployment zone, and as long as no enemy units within 10 strides have Line of Sight to it.</i></br></br> 2. Then activate it." },
                    { name: "Attract (X)", desc: "The target unit must approach your unit by making a movement of X strides in the direction that joins the center of the opponent’s troop leaders base to the center of your troop leaders base. This movement does not cause an opportunity attack.</br></br> If the target unit comes into contact with a unit or an Impassable terrain element while moving, it will stop its movement right at that point.</br></br> <i>Note: If the targeted unit touches your unit, they will be engaged in combat (but we do not consider it has charged).</i>" },
                    { name: "Berserker Rage", desc: "Your unit can inflict 1 <img src='Success.png' style= 'height:20px; display:inline; vertical-align:middle;'/> on itself to add a symbol of your choice to an attack, defense, or willpower roll. You must do this after rolling the dice and before advancing to the switches step.</br></br> You cannot deal damage if it means eliminating the unit. This damage is not taken into account when resolving a combat." },
                    { name: "Bloodlust (x)", desc: "If your unit is not engaged in combat when activated, it is forced to Charge or Assault an enemy unit indicated by “X”, whenever possible. “X” can be the name of a unit, a keyword or groups of them separated by lines (“|”). If no X value is specified, this unit must ✪Charge the nearest enemy unit.</br></br> If your unit charges or assaults due to its Bloodlust, it can re-roll all of its attack rolls during the activations it is engaged with the enemy unit, including an activation when assaulting or charging.</br></br>At the beginning of its activation, your unit can ignore the effects of Bloodlust until the end of the activation by passing a WIP test." },
                    { name: "Cover (D)", desc: "Units adjacent to this unit (allied or not) can benefit from cover against a ranged attack. (See “Attacking at a distance. Cover”). The “D” value indicates the automatic dice or symbols that adjacent units add to their defense roll." },
                    { name: "Dispel (D)", desc: "When this unit is targeted by a spell it can attempt to block it. The “D” value indicates the dice or automatic symbols that must be rolled to block the spell. This unit does not gain tinge by using any <img src='hollowshield.png' style= 'height:20px; display:inline; vertical-align:middle;'/> obtained. Remember that you cannot attempt to block a spell more than once or with more than one unit." },
                    { name: "Displace (X)", desc: "The unit you displace must make a straight movement of X strides in the direction you indicate. The effects of Terrain elements cannot affect this move (except Impassable). This movement does not cause an opportunity attack.</br></br>If when displacing the unit it comes into contact with a unit or an Impassable terrain element, it stops its movement right at that point.</br></br> <i> Note: You can displace a unit to engage it in combat (it is not considered to have charged).</i>" },
                    { name: "Elite", desc: "Once the dice have been rolled (rerolls included) and before advancing to the switches step, your unit may replace any <img src='hollowSuccess.png' style= 'height:30px; display:inline; vertical-align:middle;'/> with <img src='Success.png' style= 'height:20px; display:inline; vertical-align:middle;'/>, any <img src='hollowshield.png' style= 'height:20px; display:inline; vertical-align:middle;'/> with <img src='Shield.png' style= 'height:20px; display:inline; vertical-align:middle;'/>, and any <img src='hollowspecial.png' style= 'height:20px; display:inline; vertical-align:middle;'/> with <img src='special.png' style= 'height:20px; display:inline; vertical-align:middle;'/>.</br</br>These rules apply to WP rolls, attack (melee and ranged), defense, and the effects of skills and spells of the unit.</br></br>They do not apply to other rolls (such as tinge or spell-blocking rolls, including Dispel)." },
                    { name: "Fearless", desc: "Your unit ignores the effects of Intimidating and is immune to the fear keyword." },
                    { name: "Golem", desc: "• Your unit ignores the effects of Intimidating.</br> • Your unit is immune to the effects of the Demoralized state.</br> • Your unit cannot be demoralized. If you are stressed above your MOR value, you ignore the excess stress." },
                    { name: "Immovable", desc: "Your unit cannot be attracted, shoved, placed, displaced, or pushed back unless you want it to." },
                    { name: "Intimidating (N)", desc: "When this unit engages or is engaged in combat, the enemy unit must perform a WIP test in which they must obtain at least as many <img src='Success.png' style= 'height:20px; display:inline; vertical-align:middle;'/>  as indicated by “N to avoid stress. For every unobtained 1, they’ll have to gain stress. A unit can only suffer the effects of Intimidating once per activation." },
                    { name: "Join (X)", desc: "Characters with the ability to join a unit have it indicated in their profile using the keyword Join (X), where “X” can be the name of a unit, a characteristic, a keyword or several groups of them separated by lines (“|”). In the latter case, the target unit must have all the keywords or characteristics, or be named as at least one of the groups.</br></br> Examples:</br></br> • Join (Infantry). The Character can join a unit with the Infantry characteristic.</br> • Join (Orc Hunters). The Character can only join a unit of “Orc Hunters”.</br> • Join (Infantry, Varank). The Character can join a unit that has the Infantry and Varank characteristics.</br> • Join (Infantry, Ghent | Scout). The character can join a unit that has the Infantry and Ghent characteristics; or a unit with the Scout keyword.</br></br>A unit cannot include more than one Character." },
                    { name: "Large", desc: "• Large units can move through units that are not Large. The unit you move through must pass a WIP test to avoid stress.</br> • In addition, the unit through which it has moved must Face to Face roll its defense against as many <img src='Success.png' style= 'height:20px; display:inline; vertical-align:middle;'/> as there are troops and skill unit (up to a maximum of 3) and will suffer as much damage as <img src='Success.png' style= 'height:20px; display:inline; vertical-align:middle;'/> not canceled.</br> • Even if engaged in combat, your unit can charge a different unit it has LoS to it and can move to engage. This charge move will provoke an opportune attack.</br> • Only other Large units and terrain elements with the LoS Block keyword can block LoS to Large units.</br> • Large units are also Immovable." },
                    { name: "Manned", desc: "• Your unit ignores the effects of Intimidating.</br> • It only becomes stressed when activated more than once during the same round." },
                    { name: "Place (X)", desc: "Indicate a point on the battlefield X strides from your units troop leader. Whoever controls the target unit must take their troop leader and place it on the designated point. You must then place the rest of the target unit’s troops into formation with it.</br></br> The placed unit does not provoke opportuny attacks.</br></br> Remember that you cannot place models on top of other models, and you cannot place a unit on an Impassable terrain feature.</br></br> You can place the target unit engaged in combat with another unit (it is not considered to have charged)." },
                    { name: "Preferred Terrain (E)", desc: "Your unit can ignore the effects of any keywords on terrain elements indicated by “E”, which can indicate one type of terrain element, one keyword, or several groups of them separated by lines (“|”).</br></br>For example, preferred terrain (Forest, Rugged | Lake) would allow your unit to ignore the effects of any keywords from all forests with the Rugged keyword or from all lakes." },
                    { name: "Raging", desc: "Your unit adds <img src='Success.png' style= 'height:20px; display:inline; vertical-align:middle;'/> to its attack rolls when it charges." },
                    { name: "Scout", desc: "Scouts have two different ways to deploy on the battlefield, but they always follow these rules:</br></br>• You may deploy it anywhere in your deployment zone (it cannot engage in combat by deploying).</br> • You can deploy your Scout unit adjacent to one of the battlefield edges, as long as you do not enter your opponent’s deployment zone and no enemy units within 12 strides have Line of Sight to it.</br> 1. <i>Just After Deployment</i> Scout units can deploy right after all other units on both sides have finished deploying. If your opponent also has Scout units, whoever has the initiative decides who deploys one of their scout units first. You and your opponent must alternate until you have deployed all of them.</br>2. <i>During the game</i> First, deploy the unit following the previous section’s requirements. Then, activate your unit. You will only be able to use a simple action since deployment is considered to consume one movement action." },
                    { name: "Shove (X)", desc: "The target unit must distance itself from your unit by making a movement of X strides in the direction that joins the center of the opponent' troop leaders base to the center of your troop leaders base. This movement does not cause an opportunity attack.</br></br> If the target unit comes into contact with a unit or an Impassable terrain element while moving, it will stop its movement right at that point.</br></br> <i>Note: This move allows the target unit to engage in combat (it is not considered to have charged).</i>" },
                    { name: "<img src='Tinge.png' style= 'width:40px; display:inline; vertical-align:middle;'/> Tinge", desc: "Units with the Tinge keyword in their profile gain 1 <img src='Tinge.png' style= 'width:20px; display:inline; vertical-align:middle;'/> at the beginning of the round.</br></br><b>Characters with Tinge Joining Units</b></br></br> It is considered the unit gains Tinge while the Character is joined. Thus, the unit will receive 1 <img src='Tinge.png' style= 'width:20px; display:inline; vertical-align:middle;'/> at the beginning of the round.</br></br><b> Unit Outside the Battelfield</b></br></br>If your unit is outside the battlefield, it does not receive 1 <img src='Tinge.png' style= 'width:20px; display:inline; vertical-align:middle;'/> token at the beginning of the round (nor will it have to check its effects).</br></br><b>Tinge Switches</b</br></br> Some switches are signalled with the <img src='Tinge.png' style= 'width:20px; display:inline; vertical-align:middle;'/> symbol. This indicates you must spend the required <img src='Tinge.png' style= 'width:20px; display:inline; vertical-align:middle;'/> tokens to activate the switch and apply its effects.</br></br><b>Tinge Modifiers</b></br></br> These modifiers include the Ñ symbol, indicating that your unit receives a <img src='Tinge.png' style= 'width:20px; display:inline; vertical-align:middle;'/> token when you activate them" }
                 ] }
            ],
            abilities: [
                { category: "Abilities", 
                items: [
                    { name: "<img src='command.png' style= 'width:40px; display:inline; vertical-align:middle;'/>Command", desc: "Ignores some shields." },

                    { name: "<img src='skill.png' style= 'width:40px; display:inline; vertical-align:middle;'/> Skill", desc: "Ignores some shields." },

        const mainContent = document.getElementById('mainContent');
        const searchInput = document.getElementById('searchInput');
        const sideNav = document.getElementById('sideNav');
        const navOverlay = document.getElementById('navOverlay');
        const infoModal = document.getElementById('infoModal');
        const infoContent = document.getElementById('infoContent');

        function toggleNav() {
            sideNav.classList.toggle('open');
            navOverlay.classList.toggle('visible');
        }

        function setView(view) {
            currentView = view;
            
            // Close nav if open
            if (sideNav.classList.contains('open')) toggleNav();

            // Update active state in side nav
            document.querySelectorAll('.side-nav-link').forEach(el => el.classList.remove('active'));
            const activeNav = document.getElementById(`side-nav-${view}`);
            if (activeNav) activeNav.classList.add('active');

            render();
            window.scrollTo(0, 0);
        }
        function renderTerrain() {
            mainContent.innerHTML = `
                <div class="fade-in">
                    <div class="category-header mb-8">
                        <h2 class="heading-font gold-text text-3xl uppercase tracking-widest">Basic Terrain Elements</h2>
                    </div>

                    <div class="action-card rounded-2xl overflow-hidden border-white/10 shadow-2xl">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left terrain-table border-collapse">
                                <thead>
                                    <tr>
                                        <th>Terrain</th>
                                        <th>Keywords</th>
                                        <th class="text-left">Size</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${data.terrain.map(t => `
                                        <tr>
                                            <td class="font-bold text-white">${t.name}</td>
                                            <td><span class="text-xs opacity-70">${t.keywords}</span></td>
                                            <td class="text-left font-mono text-sm gold-text">${t.size}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="action-card p-8 rounded-2xl">
                            <h4 class="heading-font gold-text text-xs uppercase mb-2">Block LoS</h4>
                            <p class="text-xs text-slate-200">The element blocks all Lines of Sight drawn through it, as well as LoS drawn from within it and those drawn into it. Unless a terrain feature has this keyword, it is never considered to block LoS.</p>
                        </div>
                        <div class="action-card p-8 rounded-2xl">
                            <h4 class="heading-font gold-text text-xs uppercase mb-2">Cover (D)</h4>
                            <p class="text-xs text-slate-200">Units adjacent to this terrain feature can benefit from cover from a ranged attack. (See “Attacking at a distance. Cover”). The ‘D’ value indicates the automatic dice or symbols that adjacent units add to their defense roll.</p>
                        </div>
                        <div class="action-card p-8 rounded-2xl">
                            <h4 class="heading-font gold-text text-xs uppercase mb-2">Impassable</h4>
                            <p class="text-xs text-slate-200">Units cannot move through this terrain feature or end their movement on it. If an element gains the Impassable characteristic during battle (for example, as a result of a spell), units within it must move to become adjacent.</p>
                        </div>
                        <div class="action-card p-8 rounded-2xl">
                            <h4 class="heading-font gold-text text-xs uppercase mb-2">Lethal (X : D)</h4>
